<!DOCTYPE html>
<html>
<head>
  <title>Ellis Platform Dashboard</title>
</head>
<body>
  <h1>Ellis Platform Dashboard</h1>

  <!-- Wallet Info -->
  <button onclick="getAddress()">Get Wallet Address</button>
  <p id="address"></p>

  <button onclick="getBalance()">Check Balance</button>
  <p id="balance"></p>

  <!-- Faucet -->
  <h3>Request Testnet BTC</h3>
  <button onclick="requestFaucet()">Request Faucet</button>
  <p id="faucet"></p>

  <!-- Send BTC -->
  <h3>Send BTC</h3>
  <label>Destination Addresses (comma-separated, max 100):</label><br>
  <textarea id="toAddresses" rows="6" cols="50" placeholder="tb1qaddr1,tb1qaddr2,..."></textarea><br><br>

  <label>Amount per address (BTC):</label><br>
  <input type="number" id="amount" step="0.00000001" placeholder="0.00001"><br><br>

  <button onclick="sendBTC()">Send BTC</button>
  <p id="txid"></p>

<script>
function getAddress() {
  fetch('/wallet/address')
    .then(r => r.json())
    .then(d => document.getElementById('address').innerText = d.address)
}

function getBalance() {
  fetch('/wallet/balance')
    .then(r => r.json())
    .then(d => document.getElementById('balance').innerText = d.balance)
}

function requestFaucet() {
  fetch('/wallet/faucet')
    .then(r => r.json())
    .then(d => {
      document.getElementById('faucet').innerText = JSON.stringify(d)
      getBalance() // auto-update balance after faucet
    })
}

function sendBTC() {
  const addresses = document.getElementById('toAddresses').value.split(',').map(a=>a.trim())
  const amount = parseFloat(document.getElementById('amount').value)

  if (addresses.length === 0 || !amount) {
    alert("Enter at least one destination address and amount")
    return
  }
  if (addresses.length > 100) {
    alert("Max 100 addresses per transaction")
    return
  }

  const data = addresses.map(addr => ({address: addr, amount: amount}))

  fetch('/wallet/send', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(data)
  })
  .then(r=>r.json())
  .then(d=>{
    if(d.txid){
      document.getElementById('txid').innerText = "TXID: " + d.txid
      getBalance() // auto-update balance after send
    } else {
      document.getElementById('txid').innerText = "Error: " + JSON.stringify(d)
    }
  })
}
</script>
</body>
</html>
